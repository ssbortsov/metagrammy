<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#EF3124" />
  <title>Метаграммы — словесная игра</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="topbar-left">
        <button id="btn-home" class="btn btn-topbar" aria-label="На главную">
          <i class="ti ti-home" aria-hidden="true"></i>
        </button>
        <button id="btn-puzzles" class="btn btn-topbar" aria-label="Уровни">
          <i class="ti ti-list" aria-hidden="true"></i>
        </button>
        <button id="btn-reset" class="btn btn-topbar" aria-label="Сбросить">
          <i class="ti ti-refresh" aria-hidden="true"></i>
        </button>
      </div>
      <div class="task-label" id="task-label">Загадка 1</div>
      <div class="topbar-right">
        <button id="btn-hint" class="btn btn-topbar" aria-label="Подсказка">
          <i class="ti ti-bulb" aria-hidden="true"></i>
        </button>
        <button id="btn-undo" class="btn btn-topbar" aria-label="Назад">
          <i class="ti ti-arrow-back-up" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <div id="task-title" class="task-title"></div>

    <div class="scroll-area">
      <section id="ladder" class="ladder" aria-label="Лестница превращений"></section>
      <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
    </div>

    <div class="bottom-area">
      <button id="btn-check" class="btn btn-check">Проверить</button>
      <section id="keyboard" class="keyboard" aria-label="Клавиатура"></section>
    </div>

  </main>

  <div id="puzzle-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Уровни</span>
        <button id="btn-modal-close" class="btn btn-ghost" aria-label="Закрыть">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div id="puzzle-list" class="puzzle-list"></div>
    </div>
  </div>

  <!-- Призовой экран -->
  <div id="victory-modal" class="modal-overlay" hidden>
    <div class="modal victory-modal">
      <div class="victory-icon">🏆</div>
      <h2 class="victory-title">Уровень пройден!</h2>
      <p id="victory-text" class="victory-text"></p>
      <button id="btn-next-level" class="btn btn-victory">Следующий уровень</button>
    </div>
  </div>

  <!-- Онбординг -->
  <div id="onboarding" class="onboarding" hidden>
    <div class="ob-slides">

      <!-- Экран 1: Титульный -->
      <div class="ob-slide ob-active" id="ob-slide-1">
        <div class="ob-content">
          <div class="ob-logo">М</div>
          <h1 class="ob-title">Метаграммы</h1>
          <p class="ob-desc">Превращайте одно слово в другое, меняя по одной букве за шаг. Каждый промежуточный ход — настоящее слово.</p>
        </div>
        <button class="ob-btn" onclick="obNext()">Как это работает?</button>
      </div>

      <!-- Экран 2: Пример -->
      <div class="ob-slide ob-right" id="ob-slide-2">
        <div class="ob-content">
          <h2 class="ob-title">Пример</h2>
          <p class="ob-desc">Превратим КОЗУ в ВОЛКА за 4 хода:</p>
          <div class="ob-example">
            <div class="ob-word">
              <div class="ob-cell ob-locked">К</div>
              <div class="ob-cell ob-locked">О</div>
              <div class="ob-cell ob-locked">З</div>
              <div class="ob-cell ob-locked">А</div>
            </div>
            <div class="ob-word">
              <div class="ob-cell ob-done">П</div>
              <div class="ob-cell ob-same">О</div>
              <div class="ob-cell ob-same">З</div>
              <div class="ob-cell ob-same">А</div>
            </div>
            <div class="ob-word">
              <div class="ob-cell ob-same">П</div>
              <div class="ob-cell ob-same">О</div>
              <div class="ob-cell ob-done">Л</div>
              <div class="ob-cell ob-same">А</div>
            </div>
            <div class="ob-word">
              <div class="ob-cell ob-same">П</div>
              <div class="ob-cell ob-same">О</div>
              <div class="ob-cell ob-same">Л</div>
              <div class="ob-cell ob-done">К</div>
            </div>
            <div class="ob-word">
              <div class="ob-cell ob-done">В</div>
              <div class="ob-cell ob-same">О</div>
              <div class="ob-cell ob-same">Л</div>
              <div class="ob-cell ob-same">К</div>
            </div>
          </div>
          <p class="ob-hint-text">Красная буква — изменённая</p>
        </div>
        <button class="ob-btn ob-btn-start" onclick="obFinish()">Начать играть!</button>
      </div>

    </div>

    <!-- Точки-индикаторы -->
    <div class="ob-dots">
      <span class="ob-dot ob-dot-active" id="ob-dot-0"></span>
      <span class="ob-dot" id="ob-dot-1"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
